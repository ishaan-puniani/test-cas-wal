openapi: 3.0.3

# ══════════════════════════════════════════════════════════════════════════════
#  CloudAggregator — Operator Wallet API
#  OpenAPI 3.0 Specification
#
#  This file describes the HTTP callback interface that Operators must implement
#  on their wallet servers. CloudAggregator calls these endpoints whenever a
#  game requires a balance query or financial transaction.
#
#  Source document: CloudAggregator Integration Guide v2.0
#  Transport:  HTTPS, TLS 1.2+
#  HTTP Method: GET for all wallet callbacks (query-string parameters)
#  Response:   Always HTTP 200. Error codes are carried inside the JSON body.
# ══════════════════════════════════════════════════════════════════════════════

info:
  title: CloudAggregator Operator Wallet API
  version: "2.0"
  description: |
    ## Overview
    CloudAggregator is a game aggregation gateway that connects online casino
    operators to multiple game providers through a single integration.

    This specification describes the **Operator Wallet Callback API** — the
    interface that **Operators must implement** on their own servers.
    CloudAggregator acts as the caller; the Operator's wallet server is the
    receiver.

    ## Transport
    - All communications must use **TLS 1.2 or higher**.
    - All wallet callback requests use **HTTP GET** with URL-encoded query parameters.
    - All responses must return **HTTP 200**, regardless of logical outcome.
      Error codes are expressed inside the JSON response body.

    ## Idempotency
    The `transaction_id` field is the **idempotency key** for all financial
    transactions (Wager, Result, WagerAndResult, Refund, Jackpot, Purchase).
    If a duplicate `transaction_id` is received, the Operator must return the
    original response with status `"Success - duplicate request"` without
    re-processing the transaction.

    ## Authentication
    CloudAggregator signs every callback request with an HMAC-SHA256 signature
    passed in the `X-CA-Signature` header. Signature validation is optional but
    strongly recommended. Requests failing validation should be rejected with
    HTTP 401.

    ## Critical Rules
    - **Result and Refund** requests must be accepted even if the player's
      session has expired. **Never return code 1000 (Not Logged On) for
      Result or Refund requests.**
    - `balance` must always equal `real_balance + bonus_balance`.
    - All monetary values use `Decimal(18,2)` — maximum 2 decimal places.

  contact:
    name: CloudAggregator Integration Support
    email: integration@cloudaggregator.com
  license:
    name: Proprietary — Confidential

servers:
  - url: "{operatorWalletBaseUrl}"
    description: Operator Wallet Endpoint (configured per Operator during onboarding)
    variables:
      operatorWalletBaseUrl:
        default: http://localhost:3000
        description: >
          The base URL of the Operator's registered wallet server.
          Provided to CloudAggregator during onboarding.

# ══════════════════════════════════════════════════════════════════════════════
#  SECURITY
# ══════════════════════════════════════════════════════════════════════════════

security:
  - HmacSignature: []

components:

  securitySchemes:

    HmacSignature:
      type: apiKey
      in: header
      name: X-CA-Signature
      description: >
        **Optional** HMAC-SHA256 signature of the raw query string, keyed with
        the shared secret established during onboarding.
        Formula: `HMAC-SHA256(rawQueryString, sharedSecret)` (hex-encoded).
        Requests with an invalid signature should be rejected with HTTP 401.
        Requests without a signature header are permitted (validation is optional
        per Section 2.2 of the Integration Guide).

# ══════════════════════════════════════════════════════════════════════════════
#  SHARED SCHEMAS
# ══════════════════════════════════════════════════════════════════════════════

  schemas:

    # ── Common Parameters ────────────────────────────────────────────────────

    ApiVersion:
      type: string
      description: CloudAggregator API version in use. Must be echoed back verbatim.
      example: "2.0"

    SessionId:
      type: string
      maxLength: 36
      description: >
        Unique game session identifier generated by the Operator for each game
        launch. Must be prefixed with the Operator ID
        (e.g., `CA_OP_42_f3d2-9a1b-...`). Max 36 characters.
        In demo mode must be `"0"`.
      example: "CA_OP_42_3e4f2a1b-9c8d-4e5f-a6b7-c8d9e0f1a2b3"

    AccountId:
      type: string
      maxLength: 32
      pattern: '^[0-9a-zA-Z_-]+$'
      description: >
        The Operator's internal unique player identifier. Must contain only
        alphanumeric characters (no special characters), maximum 32 chars.
        Must be identical across all requests in a session.
      example: "PLR_78345"

    TransactionId:
      type: string
      maxLength: 255
      description: >
        Globally unique transaction identifier. Used as the **idempotency key**.
        Different Game Providers may use the same ID, but within a single GP
        each ID must be unique.
      example: "TXN_7617EDD0924C11E7ABB28655568"

    RoundId:
      type: string
      maxLength: 255
      description: >
        Game round identifier. Groups all Wager and Result transactions
        belonging to the same game round together.
      example: "RND_802D1812C32686748F2AFBCACFCC82114CF"

    GameId:
      type: string
      description: CloudAggregator unique game identifier.
      example: "50301"

    DeviceType:
      type: string
      enum: [desktop, mobile, tablet]
      description: The type of device currently used by the player.
      example: "desktop"

    GameStatus:
      type: string
      enum: [pending, completed]
      description: >
        The current status of the game round.
        - `pending`: The round is still in progress. Further results may follow.
        - `completed`: The round is closed. No further wagers or results will
          be accepted for this `round_id`.
      example: "completed"

    GameCategory:
      type: string
      enum: [slots, rummy, bingo, lottery, live]
      description: The category of the game generating this transaction.
      example: "slots"

    GameMode:
      type: integer
      enum: [0, 1, 2]
      description: >
        Required for CMA-compliant games.
        - `0`: Real money and bonus combined.
        - `1`: Real money only.
        - `2`: Bonus only.
      example: 1

    WalletOrder:
      type: string
      enum: [cash_money,bonus_money, bonus_money,cash_money]
      description: >
        Required for CMA-compliant games. Indicates which wallet type is drawn
        from first when processing the transaction.
      example: "cash_money,bonus_money"

    MonetaryAmount:
      type: number
      format: decimal
      multipleOf: 0.01
      minimum: 0
      description: >
        Monetary value in the major denomination unit (not cents).
        Maximum 2 decimal places. Decimal(18,2).
      example: 250.00

    # ── Base Response ─────────────────────────────────────────────────────────

    BaseResponse:
      type: object
      required: [code, status, api_version]
      properties:
        code:
          type: integer
          description: >
            Response status code. See Appendix A (Section 7) for all valid
            codes. HTTP status is always 200; this field carries the logical
            result.
          example: 200
        status:
          type: string
          description: Human-readable status string matching the code.
          example: "Success"
        api_version:
          $ref: '#/components/schemas/ApiVersion'
        message:
          type: string
          description: Optional additional detail. Present on error responses.
          example: "An internal error occurred."

    # ── Balance Fields ────────────────────────────────────────────────────────

    BalanceFields:
      type: object
      required: [balance, real_balance, bonus_balance]
      properties:
        balance:
          allOf: [$ref: '#/components/schemas/MonetaryAmount']
          description: >
            Total player balance (real_balance + bonus_balance). Must always
            equal the sum of the two component fields.
          example: 300.00
        real_balance:
          allOf: [$ref: '#/components/schemas/MonetaryAmount']
          description: Player's real-money wallet balance.
          example: 250.00
        bonus_balance:
          allOf: [$ref: '#/components/schemas/MonetaryAmount']
          description: Player's bonus money wallet balance.
          example: 50.00

    CmaFields:
      type: object
      properties:
        game_mode:
          $ref: '#/components/schemas/GameMode'
        wallet_order:
          $ref: '#/components/schemas/WalletOrder'

    # ── Error Response ────────────────────────────────────────────────────────

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      description: >
        All wallet callback responses use HTTP 200. Errors are signalled by a
        non-200 `code` value inside the body.
      example:
        code: 1
        status: "Technical Error"
        message: "An internal error occurred."
        api_version: "2.0"

    # ══ GetAccount ════════════════════════════════════════════════════════════

    GetAccountResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          properties:
            account_id:
              $ref: '#/components/schemas/AccountId'
            currency:
              type: string
              maxLength: 8
              description: >
                Player's registered currency. ISO 4217 fiat code (e.g., EUR, USD)
                or virtual currency (e.g., COINS, CHIPS). Max 8 characters.
              example: "EUR"
            language:
              type: string
              description: >
                Player's preferred language. Format: ISO 639-1 language code
                followed by underscore and ISO 3166-1 alpha-2 country code
                (e.g., en_GB, sv_SE).
              example: "en_GB"
            country:
              type: string
              minLength: 2
              maxLength: 2
              description: ISO 3166-1 alpha-2 country code of the player's location.
              example: "SE"
            city:
              type: string
              maxLength: 64
              description: City where the player is logged in from.
              example: "Stockholm"
            session_id:
              $ref: '#/components/schemas/SessionId'
            real_balance:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Player's real-money balance.
              example: 250.00
            bonus_balance:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Player's bonus balance.
              example: 50.00
      example:
        code: 200
        status: "Success"
        account_id: "PLR_78345"
        currency: "EUR"
        language: "en_GB"
        country: "SE"
        city: "Stockholm"
        session_id: "CA_OP_42_3e4f2a1b-9c8d-4e5f-a6b7-c8d9e0f1a2b3"
        real_balance: 250.00
        bonus_balance: 50.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ GetBalance ════════════════════════════════════════════════════════════

    GetBalanceResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
      example:
        code: 200
        status: "Success"
        balance: 300.00
        real_balance: 250.00
        bonus_balance: 50.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ Wager ═════════════════════════════════════════════════════════════════

    WagerResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          required: [wager_tx_id, real_money_bet, bonus_money_bet]
          properties:
            wager_tx_id:
              type: string
              maxLength: 64
              description: >
                The Operator's internal transaction reference for this wager.
                Used for reconciliation.
              example: "OP_TXN_8823AABB"
            real_money_bet:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: >
                Portion of bet_amount deducted from real_balance.
                `real_money_bet + bonus_money_bet` must equal `bet_amount`.
              example: 5.00
            bonus_money_bet:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: >
                Portion of bet_amount deducted from bonus_balance. Set to 0 if
                the casino does not operate a bonus wallet.
              example: 0.00
      example:
        code: 200
        status: "Success"
        wager_tx_id: "OP_TXN_8823AABB"
        balance: 295.00
        real_balance: 245.00
        bonus_balance: 50.00
        real_money_bet: 5.00
        bonus_money_bet: 0.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ Result ════════════════════════════════════════════════════════════════

    ResultResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          required: [result_tx_id, real_money_win, bonus_win]
          properties:
            result_tx_id:
              type: string
              maxLength: 64
              description: The Operator's internal wallet transaction ID for the credit.
              example: "WALL_TXN_CC99AA"
            real_money_win:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: >
                Portion of win_amount credited to real_balance.
                `real_money_win + bonus_win` must equal `win_amount`.
              example: 12.50
            bonus_win:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: >
                Portion of win_amount credited to bonus_balance. Set to 0 if
                no bonus wallet is used.
              example: 0.00
      example:
        code: 200
        status: "Success"
        result_tx_id: "WALL_TXN_CC99AA"
        balance: 307.50
        real_balance: 257.50
        bonus_balance: 50.00
        real_money_win: 12.50
        bonus_win: 0.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ WagerAndResult ════════════════════════════════════════════════════════

    WagerAndResultResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          required: [wager_tx_id, result_tx_id, real_money_bet, bonus_money_bet, real_money_win, bonus_win]
          properties:
            wager_tx_id:
              type: string
              maxLength: 64
              description: Operator's internal reference for the wager leg.
              example: "WALL_TXN_WR_991A"
            result_tx_id:
              type: string
              maxLength: 64
              description: Operator's internal reference for the result leg.
              example: "WALL_TXN_WR_991B"
            real_money_bet:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of bet_amount deducted from real_balance.
              example: 2.00
            bonus_money_bet:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of bet_amount deducted from bonus_balance.
              example: 0.00
            real_money_win:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of win_amount credited to real_balance.
              example: 6.00
            bonus_win:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of win_amount credited to bonus_balance.
              example: 0.00
      example:
        code: 200
        status: "Success"
        wager_tx_id: "WALL_TXN_WR_991A"
        result_tx_id: "WALL_TXN_WR_991B"
        balance: 304.00
        real_balance: 254.00
        bonus_balance: 50.00
        real_money_bet: 2.00
        bonus_money_bet: 0.00
        real_money_win: 6.00
        bonus_win: 0.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ Refund ════════════════════════════════════════════════════════════════

    RefundResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          required: [refund_tx_id]
          properties:
            refund_tx_id:
              type: string
              maxLength: 64
              description: Operator's internal reference for the refund credit.
              example: "OP_RB_TXN_8823BB"
      example:
        code: 200
        status: "Success"
        refund_tx_id: "OP_RB_TXN_8823BB"
        balance: 300.00
        real_balance: 250.00
        bonus_balance: 50.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ Jackpot ═══════════════════════════════════════════════════════════════

    JackpotResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          required: [wallet_tx_id, real_money_win, bonus_win]
          properties:
            wallet_tx_id:
              type: string
              maxLength: 64
              description: Operator's internal wallet transaction ID for the jackpot credit.
              example: "WALL_JP_TXN_8811"
            real_money_win:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of the jackpot credited to the real-money balance.
              example: 10000.00
            bonus_win:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of the jackpot credited to the bonus balance.
              example: 0.00
      example:
        code: 200
        status: "Success"
        wallet_tx_id: "WALL_JP_TXN_8811"
        balance: 10300.00
        real_balance: 10250.00
        bonus_balance: 50.00
        real_money_win: 10000.00
        bonus_win: 0.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

    # ══ Purchase ══════════════════════════════════════════════════════════════

    PurchaseResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - $ref: '#/components/schemas/BalanceFields'
        - $ref: '#/components/schemas/CmaFields'
        - type: object
          required: [purchase_tx_id, real_money_bet, bonus_money_bet]
          properties:
            purchase_tx_id:
              type: string
              maxLength: 64
              description: Operator's internal transaction reference for the purchase.
              example: "OP_TXN_8823AABB"
            real_money_bet:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: >
                Portion of purchase_amount deducted from real_balance.
                `real_money_bet + bonus_money_bet` must equal `purchase_amount`.
              example: 5.00
            bonus_money_bet:
              allOf: [$ref: '#/components/schemas/MonetaryAmount']
              description: Portion of purchase_amount deducted from bonus_balance.
              example: 0.00
      example:
        code: 200
        status: "Success"
        purchase_tx_id: "OP_TXN_8823AABB"
        balance: 295.00
        real_balance: 245.00
        bonus_balance: 50.00
        real_money_bet: 5.00
        bonus_money_bet: 0.00
        game_mode: 1
        wallet_order: "cash_money,bonus_money"
        api_version: "2.0"

  # ── Reusable Query Parameters ───────────────────────────────────────────────

  parameters:

    p_request:
      name: request
      in: query
      required: true
      schema:
        type: string
        enum: [getaccount, getbalance, wager, result, wagerAndResult, refund, jackpot, purchase]
      description: >
        Identifies the wallet operation. CloudAggregator routes all callbacks to
        the single `/cloudagg` endpoint using this discriminator field.

    p_session_id:
      name: session_id
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/SessionId'

    p_account_id:
      name: account_id
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/AccountId'

    p_transaction_id:
      name: transaction_id
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/TransactionId'

    p_round_id:
      name: round_id
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/RoundId'

    p_round_id_optional:
      name: round_id
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/RoundId'

    p_game_id:
      name: game_id
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/GameId'

    p_device:
      name: device
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/DeviceType'

    p_api_version:
      name: api_version
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/ApiVersion'

    p_game_status:
      name: game_status
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/GameStatus'

    p_frb_id:
      name: frb_id
      in: query
      required: false
      schema:
        type: string
        maxLength: 255
        description: >
          Free Rounds Bonus offer ID. Present when the transaction is part of
          an FRB promotion. In FRB mode the `bet_amount` may be `0.00`.
        example: "FRB_OFFER_9182"

    p_game_category:
      name: game_category
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/GameCategory'

  # ── Reusable Responses ──────────────────────────────────────────────────────

  responses:

    WalletResponseNote:
      description: >
        **All wallet callback responses always return HTTP 200.**
        The logical result (success or error) is carried in the `code` field
        inside the JSON body. See Appendix A (Section 7) for the full code table.

# ══════════════════════════════════════════════════════════════════════════════
#  PATHS
#  All eight wallet operations share a single GET endpoint on /cloudagg.
#  The `request` query parameter acts as the operation discriminator.
# ══════════════════════════════════════════════════════════════════════════════

paths:

  /cloudagg:
    get:
      operationId: walletCallback
      summary: Operator Wallet Callback (all operations)
      description: |
        CloudAggregator sends all wallet callback requests to this single
        endpoint. The `request` query parameter identifies the operation type.

        | `request` value  | Operation          | Section |
        |------------------|--------------------|---------|
        | `getaccount`     | Get Account        | 5.3     |
        | `getbalance`     | Get Balance        | 5.4     |
        | `wager`          | Wager (Bet)        | 5.5     |
        | `result`         | Result (Win)       | 5.6     |
        | `wagerAndResult` | Wager & Result     | 5.7     |
        | `refund`         | Refund             | 5.8     |
        | `jackpot`        | Jackpot            | 5.9     |
        | `purchase`       | Purchase           | 5.10    |

        > **Note:** HTTP status is always `200`. Business errors are signalled
        > by `code` values other than `200` inside the response body.
      tags:
        - Wallet Callbacks
      parameters:
        - $ref: '#/components/parameters/p_request'
      responses:
        '200':
          description: >
            The operation was received. Inspect the `code` field in the body
            for the logical result. HTTP 200 is returned for both success and
            error conditions.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GetAccountResponse'
                  - $ref: '#/components/schemas/GetBalanceResponse'
                  - $ref: '#/components/schemas/WagerResponse'
                  - $ref: '#/components/schemas/ResultResponse'
                  - $ref: '#/components/schemas/WagerAndResultResponse'
                  - $ref: '#/components/schemas/RefundResponse'
                  - $ref: '#/components/schemas/JackpotResponse'
                  - $ref: '#/components/schemas/PurchaseResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                success:
                  summary: Generic success
                  value:
                    code: 200
                    status: "Success"
                    api_version: "2.0"
                duplicate:
                  summary: Idempotent duplicate request
                  value:
                    code: 200
                    status: "Success - duplicate request"
                    api_version: "2.0"
                technicalError:
                  summary: Internal error
                  value:
                    code: 1
                    status: "Technical Error"
                    message: "An internal error occurred."
                    api_version: "2.0"
        '401':
          description: >
            Invalid or missing HMAC signature (only when the Operator has
            enabled mandatory signature validation).

# ══════════════════════════════════════════════════════════════════════════════
#  VIRTUAL PATHS — one path stub per operation for clear API documentation.
#  All resolve to GET /cloudagg with the matching `request` parameter.
# ══════════════════════════════════════════════════════════════════════════════

  /cloudagg?request=getaccount:
    get:
      operationId: getAccount
      summary: "5.3 GetAccount — Retrieve player profile and session data"
      description: |
        CloudAggregator sends this request at the start of a game session to
        retrieve the player's identity, currency, language, location, and
        current balance. **Not all Game Providers send GetAccount** — this is
        normal behaviour and not an error.

        ### Operator Responsibilities
        - Validate `session_id` is active and maps to the provided `account_id`.
          Return `1003` if validation fails.
        - Return the `account_id` consistently — it must be identical across all
          requests for the same player.
        - If the same `session_id` was already used for a prior GetAccount,
          return the original response with `status = "Success - duplicate request"`.
      tags:
        - 5.3 GetAccount
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [getaccount]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_device'
        - $ref: '#/components/parameters/p_api_version'
        - name: game_id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/GameId'
          description: CloudAggregator game identifier for the active session.
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body for the logical result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    account_id: "PLR_78345"
                    currency: "EUR"
                    language: "en_GB"
                    country: "SE"
                    city: "Stockholm"
                    session_id: "CA_OP_42_3e4f2a1b-9c8d-4e5f-a6b7-c8d9e0f1a2b3"
                    real_balance: 250.00
                    bonus_balance: 50.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                duplicate:
                  summary: Idempotent duplicate (same session_id seen before)
                  value:
                    code: 200
                    status: "Success - duplicate request"
                    account_id: "PLR_78345"
                    currency: "EUR"
                    language: "en_GB"
                    country: "SE"
                    city: "Stockholm"
                    session_id: "CA_OP_42_3e4f2a1b-9c8d-4e5f-a6b7-c8d9e0f1a2b3"
                    real_balance: 250.00
                    bonus_balance: 50.00
                    api_version: "2.0"
                technicalError:
                  summary: "Error 1 — Technical Error"
                  value:
                    code: 1
                    status: "Technical Error"
                    message: "internal_error"
                    api_version: "2.0"
                authFailed:
                  summary: "Error 1003 — Authentication Failed"
                  value:
                    code: 1003
                    status: "Authentication Failed"
                    message: "authentication_failed"
                    api_version: "2.0"
                missingParam:
                  summary: "Error 1008 — Parameter Required"
                  value:
                    code: 1008
                    status: "Parameter Required"
                    message: "missing_parameter"
                    api_version: "2.0"

  /cloudagg?request=getbalance:
    get:
      operationId: getBalance
      summary: "5.4 GetBalance — Return current player wallet balance"
      description: |
        Called before game rounds begin and periodically during gameplay to
        retrieve the player's current balance.

        ### Operator Responsibilities
        - Validate `session_id` against `account_id`. Return `1000` if invalid.
        - **Always return the live balance** — do not return cached values.
        - `balance` must always equal `real_balance + bonus_balance`.
      tags:
        - 5.4 GetBalance
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [getbalance]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_device'
        - $ref: '#/components/parameters/p_game_id'
        - $ref: '#/components/parameters/p_api_version'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBalanceResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    balance: 300.00
                    real_balance: 250.00
                    bonus_balance: 50.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                technicalError:
                  summary: "Error 1 — Technical Error"
                  value:
                    code: 1
                    status: "Technical Error"
                    message: "An internal error occurred while fetching the player balance."
                    api_version: "2.0"
                notLoggedOn:
                  summary: "Error 1000 — Not Logged On"
                  value:
                    code: 1000
                    status: "Not Logged On"
                    message: "session_invalid"
                    api_version: "2.0"
                authFailed:
                  summary: "Error 1003 — Authentication Failed"
                  value:
                    code: 1003
                    status: "Authentication Failed"
                    message: "authentication_failed"
                    api_version: "2.0"

  /cloudagg?request=wager:
    get:
      operationId: wager
      summary: "5.5 Wager — Deduct bet amount from player wallet"
      description: |
        Sent when a player places a bet. The Operator must deduct `bet_amount`
        from the player's wallet and return the updated balance.

        ### Idempotency
        Use `transaction_id` as the idempotency key. If an identical
        `transaction_id` has already been processed, return the original response
        with `status = "Success - duplicate request"` without re-deducting.
        If `transaction_id` matches but any essential field differs
        (`account_id`, `bet_amount`), return `400`.

        ### FRB Mode
        When `frb_id` is present, `bet_amount` may be `0.00`.

        ### Operator Responsibilities
        - Validate `session_id` ↔ `account_id`. Reject with `110` if mismatched.
        - Check sufficient funds (`real_balance + bonus_balance ≥ bet_amount`). Return `1006`.
        - Enforce responsible gaming limits. Return `1019`.
        - Check account is not blocked/self-excluded. Return `1035`.
        - Check round is not already closed (`409`).
        - Store `session_id`, `account_id`, `round_id`, `transaction_id`, `bet_amount`
          for future Result and Refund lookups.
      tags:
        - 5.5 Wager
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [wager]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_transaction_id'
        - $ref: '#/components/parameters/p_round_id'
        - $ref: '#/components/parameters/p_game_id'
        - name: bet_amount
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: >
              Total wager amount in major currency units (real + bonus combined).
              Cannot be negative. Decimal(18,2). May be `0.00` in FRB mode.
          example: "5.00"
        - $ref: '#/components/parameters/p_device'
        - $ref: '#/components/parameters/p_api_version'
        - $ref: '#/components/parameters/p_frb_id'
        - $ref: '#/components/parameters/p_game_category'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WagerResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    wager_tx_id: "OP_TXN_8823AABB"
                    balance: 295.00
                    real_balance: 245.00
                    bonus_balance: 50.00
                    real_money_bet: 5.00
                    bonus_money_bet: 0.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                duplicate:
                  summary: "Idempotent duplicate"
                  value:
                    code: 200
                    status: "Success - duplicate request"
                    wager_tx_id: "OP_TXN_8823AABB"
                    balance: 295.00
                    real_balance: 245.00
                    bonus_balance: 50.00
                    real_money_bet: 5.00
                    bonus_money_bet: 0.00
                    api_version: "2.0"
                technicalError:
                  summary: "Error 1 — Technical Error"
                  value: { code: 1, status: "Technical Error", message: "internal_error", api_version: "2.0" }
                operationNotAllowed:
                  summary: "Error 110 — Operation Not Allowed"
                  value: { code: 110, status: "Operation Not Allowed", message: "operation_not_allowed", api_version: "2.0" }
                paramMismatch:
                  summary: "Error 400 — Transaction Parameter Mismatch"
                  value: { code: 400, status: "Transaction Parameter Mismatch", message: "Transaction parameter mismatch", api_version: "2.0" }
                roundClosed:
                  summary: "Error 409 — Round Already Closed"
                  value: { code: 409, status: "Round Already Closed", message: "round_closed", api_version: "2.0" }
                txnIdExists:
                  summary: "Error 409 — Transaction ID In Use"
                  value: { code: 409, status: "Transaction ID In Use", message: "transactionId already in use", api_version: "2.0" }
                notLoggedOn:
                  summary: "Error 1000 — Not Logged On"
                  value: { code: 1000, status: "Not Logged On", message: "session_invalid", api_version: "2.0" }
                outOfMoney:
                  summary: "Error 1006 — Out of Money"
                  value: { code: 1006, status: "Out of Money", message: "insufficient_funds", api_version: "2.0" }
                gamingLimit:
                  summary: "Error 1019 — Gaming Limit"
                  value: { code: 1019, status: "Gaming Limit", message: "limit_exceeded", api_version: "2.0" }
                accountBlocked:
                  summary: "Error 1035 — Account Blocked"
                  value: { code: 1035, status: "Account Blocked", message: "account_blocked", api_version: "2.0" }

  /cloudagg?request=result:
    get:
      operationId: result
      summary: "5.6 Result — Credit win amount to player wallet"
      description: |
        Sent when a game round concludes. `win_amount = 0.00` means the player
        lost; the round must still be closed. Must be idempotent on `transaction_id`.

        ### ⚠️ Critical Rule
        **Result requests must be accepted even if the player's session has
        expired.** Never return `1000 (Not Logged On)` for a Result — this is a
        protocol violation and will cause CloudAggregator to retry indefinitely.

        ### game_status Behaviour
        - `pending`: Store `session_id`, `account_id`, `round_id`, `transaction_id`
          for possible future Refund calls. Do not close the round.
        - `completed`: Credit `win_amount`, close the round. Reject all future
          wagers and results for this `round_id`.

        Multiple `pending` results may exist per round, but exactly one
        `completed` result will close it.
      tags:
        - 5.6 Result
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [result]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_transaction_id'
        - $ref: '#/components/parameters/p_round_id'
        - $ref: '#/components/parameters/p_game_id'
        - name: win_amount
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: >
              Amount won by the player in major currency units. `0.00` if the
              player lost. The round must still be processed. Cannot be negative.
          example: "12.50"
        - $ref: '#/components/parameters/p_game_status'
        - name: wager_transaction_id
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
            description: >
              The `transaction_id` of the original Wager for this round.
              Availability depends on the Game Provider.
          example: "TXN_WAGER_C11E7ABB"
        - name: device
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/DeviceType'
        - $ref: '#/components/parameters/p_api_version'
        - $ref: '#/components/parameters/p_frb_id'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    result_tx_id: "WALL_TXN_CC99AA"
                    balance: 307.50
                    real_balance: 257.50
                    bonus_balance: 50.00
                    real_money_win: 12.50
                    bonus_win: 0.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                zeroWin:
                  summary: Zero win (player lost)
                  value:
                    code: 200
                    status: "Success"
                    result_tx_id: "WALL_TXN_AA001"
                    balance: 295.00
                    real_balance: 245.00
                    bonus_balance: 50.00
                    real_money_win: 0.00
                    bonus_win: 0.00
                    api_version: "2.0"
                technicalError:
                  summary: "Error 1 — Technical Error"
                  value: { code: 1, status: "Technical Error", message: "internal_error", api_version: "2.0" }
                operationNotAllowed:
                  summary: "Error 110 — Operation Not Allowed"
                  value: { code: 110, status: "Operation Not Allowed", message: "operation_not_allowed", api_version: "2.0" }
                paramMismatch:
                  summary: "Error 400 — Transaction Parameter Mismatch"
                  value: { code: 400, status: "Transaction Parameter Mismatch", message: "Transaction parameter mismatch", api_version: "2.0" }
                roundClosed:
                  summary: "Error 409 — Round Already Closed"
                  value: { code: 409, status: "Round Already Closed", message: "round_closed", api_version: "2.0" }

  /cloudagg?request=wagerAndResult:
    get:
      operationId: wagerAndResult
      summary: "5.7 WagerAndResult — Atomic bet and win in a single call"
      description: |
        Some Game Providers send both the Wager and the Result in a single
        atomic request. Common for Rummy, Bingo, Lottery, and some Slot variants.

        The Operator must atomically deduct `bet_amount` and credit `win_amount`
        in a single operation. All validation, idempotency, and responsible gaming
        checks from Sections 5.5 and 5.6 apply equally here.

        ### FRB Mode
        `bet_amount` is `0.00` in FRB mode; `win_amount` may be `0.00` or greater.
      tags:
        - 5.7 WagerAndResult
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [wagerAndResult]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_transaction_id'
        - $ref: '#/components/parameters/p_round_id'
        - $ref: '#/components/parameters/p_game_id'
        - name: bet_amount
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: Total wager amount. `0.00` in FRB mode.
          example: "2.00"
        - name: win_amount
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: Total win amount. `0.00` if the player lost.
          example: "6.00"
        - $ref: '#/components/parameters/p_game_status'
        - $ref: '#/components/parameters/p_device'
        - $ref: '#/components/parameters/p_api_version'
        - $ref: '#/components/parameters/p_frb_id'
        - $ref: '#/components/parameters/p_game_category'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WagerAndResultResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    wager_tx_id: "WALL_TXN_WR_991A"
                    result_tx_id: "WALL_TXN_WR_991B"
                    balance: 304.00
                    real_balance: 254.00
                    bonus_balance: 50.00
                    real_money_bet: 2.00
                    bonus_money_bet: 0.00
                    real_money_win: 6.00
                    bonus_win: 0.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                outOfMoney:
                  summary: "Error 1006 — Out of Money"
                  value: { code: 1006, status: "Out of Money", message: "insufficient_funds", api_version: "2.0" }
                gamingLimit:
                  summary: "Error 1019 — Gaming Limit"
                  value: { code: 1019, status: "Gaming Limit", message: "limit_exceeded", api_version: "2.0" }
                accountBlocked:
                  summary: "Error 1035 — Account Blocked"
                  value: { code: 1035, status: "Account Blocked", message: "account_blocked", api_version: "2.0" }

  /cloudagg?request=refund:
    get:
      operationId: refund
      summary: "5.8 Refund — Reverse a previously placed wager"
      description: |
        Sent to reverse a Wager when the corresponding Result could not be
        delivered due to a technical failure. Applies only to Wagers — not to
        failed Results.

        ### ⚠️ Critical Rule
        **Refund requests must be accepted even if the player's session has
        expired.** Never return `1000 (Not Logged On)` for a Refund.

        ### Key Behaviours
        - Locate the original Wager by `transaction_id`. Return `102` if not found.
        - If a Result has already been processed for the Wager's `round_id`,
          return `110` — the round cannot be reversed.
        - If `refund_amount` is absent, refund the full original `bet_amount`.
        - Operators must handle refunds using `transaction_id` alone; `round_id`
          may not always be present in the request.
        - The Casino must refund the player **only** if a successful wager was found.
      tags:
        - 5.8 Refund
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [refund]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_transaction_id'
        - $ref: '#/components/parameters/p_game_id'
        - name: round_id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/RoundId'
          description: >
            The `round_id` of the Wager being reversed. May not always be present;
            Operators must handle refunds by `transaction_id` alone.
        - name: refund_amount
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: >
              Amount to refund. When present, matches the original `bet_amount`.
              When absent, the Operator must refund the full original wager amount.
          example: "5.00"
        - $ref: '#/components/parameters/p_device'
        - $ref: '#/components/parameters/p_api_version'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    refund_tx_id: "OP_RB_TXN_8823BB"
                    balance: 300.00
                    real_balance: 250.00
                    bonus_balance: 50.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                wagerNotFound:
                  summary: "Error 102 — Wager Not Found"
                  value: { code: 102, status: "Wager Not Found", message: "wager_not_found", api_version: "2.0" }
                resultExists:
                  summary: "Error 110 — Operation Not Allowed (result already delivered)"
                  value: { code: 110, status: "Operation Not Allowed", message: "result_already_exists", api_version: "2.0" }
                paramMismatch:
                  summary: "Error 400 — Transaction Parameter Mismatch"
                  value: { code: 400, status: "Transaction Parameter Mismatch", message: "Transaction parameter mismatch", api_version: "2.0" }

  /cloudagg?request=jackpot:
    get:
      operationId: jackpot
      summary: "5.9 Jackpot — Credit a jackpot prize to the player wallet"
      description: |
        Sent when a player wins a progressive or fixed jackpot. Functions
        similarly to a Result — credit the `jackpot_amount` to the player's
        wallet. Must be idempotent on `transaction_id`.
      tags:
        - 5.9 Jackpot
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [jackpot]
        - $ref: '#/components/parameters/p_session_id'
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_transaction_id'
        - $ref: '#/components/parameters/p_round_id'
        - $ref: '#/components/parameters/p_game_id'
        - name: jackpot_amount
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: Jackpot prize amount in major currency units. Cannot be negative.
          example: "10000.00"
        - $ref: '#/components/parameters/p_game_status'
        - $ref: '#/components/parameters/p_api_version'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JackpotResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    wallet_tx_id: "WALL_JP_TXN_8811"
                    balance: 10300.00
                    real_balance: 10250.00
                    bonus_balance: 50.00
                    real_money_win: 10000.00
                    bonus_win: 0.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                operationNotAllowed:
                  summary: "Error 110 — Operation Not Allowed"
                  value: { code: 110, status: "Operation Not Allowed", message: "operation_not_allowed", api_version: "2.0" }
                paramMismatch:
                  summary: "Error 400 — Transaction Parameter Mismatch"
                  value: { code: 400, status: "Transaction Parameter Mismatch", message: "Transaction parameter mismatch", api_version: "2.0" }

  /cloudagg?request=purchase:
    get:
      operationId: purchase
      summary: "5.10 Purchase — Deduct an in-game feature or tournament fee"
      description: |
        Sent when a player buys an in-game feature (Feature Buy, Free Spin Buy,
        Tournament Entry Fee, etc.). Deducts `purchase_amount` from the player's
        wallet. Idempotent on `transaction_id`.

        **By default, additional features are disabled** and enabled on request.
        API changes on the Operator endpoint may be needed depending on the
        features activated.

        ### session_id
        The `session_id` field is required but `irrespective of game id` —
        tournament tickets may not have an active game session. When provided,
        validate it against `account_id`. When no game-specific session exists,
        the Operator should still accept the request if `account_id` is valid.
      tags:
        - 5.10 Purchase
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            enum: [purchase]
        - name: session_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SessionId'
          description: >
            The active session ID, irrespective of game id. For tournament
            purchases there may be no game-specific session; validate against
            `account_id` when provided.
        - $ref: '#/components/parameters/p_account_id'
        - $ref: '#/components/parameters/p_transaction_id'
        - name: product_id
          in: query
          required: true
          schema:
            type: string
            description: CloudAggregator product ID for the item being purchased.
          example: "PROD_FEATURE_BUY_001"
        - name: purchase_amount
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+(\.\d{1,2})?$'
            description: >
              Total purchase amount in major currency units (real + bonus combined).
              Cannot be negative. Decimal(18,2).
          example: "5.00"
        - $ref: '#/components/parameters/p_device'
        - $ref: '#/components/parameters/p_api_version'
        - $ref: '#/components/parameters/p_round_id_optional'
        - $ref: '#/components/parameters/p_frb_id'
        - $ref: '#/components/parameters/p_game_category'
      responses:
        '200':
          description: Always HTTP 200. Check `code` in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseResponse'
              examples:
                success:
                  summary: Success
                  value:
                    code: 200
                    status: "Success"
                    purchase_tx_id: "OP_TXN_8823AABB"
                    balance: 295.00
                    real_balance: 245.00
                    bonus_balance: 50.00
                    real_money_bet: 5.00
                    bonus_money_bet: 0.00
                    game_mode: 1
                    wallet_order: "cash_money,bonus_money"
                    api_version: "2.0"
                outOfMoney:
                  summary: "Error 1006 — Out of Money"
                  value: { code: 1006, status: "Out of Money", message: "insufficient_funds", api_version: "2.0" }
                accountBlocked:
                  summary: "Error 1035 — Account Blocked"
                  value: { code: 1035, status: "Account Blocked", message: "account_blocked", api_version: "2.0" }

