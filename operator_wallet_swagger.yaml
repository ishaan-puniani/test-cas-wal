#  TAGS
# ══════════════════════════════════════════════════════════════════════════════

tags:
  - name: Wallet Callbacks
    description: All wallet operations share a single GET endpoint on `/cloudagg`.

  - name: 5.3 GetAccount
    description: |
      Retrieve player profile and session data at the start of a game session.
      **Not all Game Providers send this request** — integration must not depend on it.

  - name: 5.4 GetBalance
    description: |
      Return the player's current live wallet balance. Called before game rounds
      and periodically during gameplay.
      **Rule:** `balance` must always equal `real_balance + bonus_balance`.

  - name: 5.5 Wager
    description: |
      Deduct a bet amount from the player's wallet. Idempotent on `transaction_id`.
      Enforce responsible gaming limits, balance checks, and account status.

  - name: 5.6 Result
    description: |
      Credit winnings after a game round concludes. `win_amount = 0.00` is a valid
      lost round and must still close the round.
      **Critical:** Accept results even when the session has expired. Never return 1000.

  - name: 5.7 WagerAndResult
    description: |
      Atomic single-request bet and win. Common for Rummy, Bingo, and Lottery.
      All Wager and Result rules apply.

  - name: 5.8 Refund
    description: |
      Reverse a previously placed wager when a Result could not be delivered.
      **Critical:** Accept refunds even when the session has expired. Never return 1000.

  - name: 5.9 Jackpot
    description: |
      Credit a progressive or fixed jackpot prize. Mirrors the Result endpoint.
      Idempotent on `transaction_id`.

  - name: 5.10 Purchase
    description: |
      Deduct an in-game feature purchase, free-spin buy, or tournament entry fee.
      Session ID is required but game-session-independent for tournament tickets.

  - name: Test Utilities
    description: |
      These endpoints manage the **local in-memory store** that backs the mock wallet
      server. They exist exclusively for testing and have no equivalent in a live
      production wallet — they are blocked in `NODE_ENV=production`.

      ## Purpose
      Use this group to build and inspect the exact player state you need before
      firing any `/cloudagg` wallet callback, so you always get a predictable,
      reproducible response.

      ## Typical test workflow

      ```
      1. /create-data?request=create_account   → create PLR_78345 with €1000 real + €50 bonus
      2. /create-data?request=create_session   → link session_id "demo-session" to PLR_78345
      3. /cloudagg?request=getbalance           → validate the balance is returned correctly
      4. /cloudagg?request=wager                → place a €5 bet, check balance drops to €995
      5. /whats-in-data                         → inspect the full store snapshot
      6. /reset-store                           → wipe everything and start fresh
      ```

      ## Available helpers

      | Endpoint | What it does |
      |---|---|
      | **Create Account** | Add a new player with balance, currency, locale, game mode, wallet order, and optional block state |
      | **Create Session** | Map a `session_id` token to an existing `account_id` |
      | **Set Real Balance** | Overwrite a player's real-money balance (top-up or drain to zero) |
      | **Set Bonus Balance** | Overwrite a player's bonus balance |
      | **Block Account** | Toggle the blocked flag — triggers error `1035` on the next wager |
      | **Set Wallet Order** | Swap draw priority between `cash_money` and `bonus_money` |
      | **Whats In Data** | Dump the full in-memory state: accounts, sessions, and transactions |
      | **Reset Store** | Wipe accounts, sessions, and transactions in one call |

      > **Note:** All helper routes require `NODE_ENV` to be anything except `production`.
      > In production they return HTTP `403 Forbidden`.

  - name: Create Account
    description: |
      Create a new player account in the in-memory store.

      The only required field is `account_id`. Every other field has a sensible
      default so you can click **Execute** on any pre-filled example without
      typing anything.

      **Defaults applied when a field is omitted:**

      | Field | Default |
      |---|---|
      | `real_balance` | `0` |
      | `bonus_balance` | `0` |
      | `currency` | `EUR` |
      | `language` | `en` |
      | `country` | `""` (empty) |
      | `city` | `""` (empty) |
      | `game_mode` | `1` |
      | `wallet_order` | `cash_money,bonus_money` |
      | `blocked` | `false` |

      Returns `409` if the `account_id` already exists. Use
      `/reset-store` or `/create-data?request=set_real_balance` to change state
      on an existing account rather than re-creating it.

  - name: Create Session
    description: |
      Map a `session_id` token to an existing `account_id`.

      This is the authentication step. Every `/cloudagg` callback that validates
      a session (`getaccount`, `getbalance`, `wager`, `wagerAndResult`) looks up
      the `session_id` in this map and checks it equals the `account_id` in the
      request. Calls that arrive without a matching session return error `1000
      (Not Logged On)`.

      **Prerequisites:**
      - The `account_id` must already exist — create it first with
        `/create-data?request=create_account`.

      **One `session_id` → one `account_id`.** Saving the same `session_id`
      again for a different account will silently overwrite the mapping.

  - name: Set Real Balance
    description: |
      Overwrite a player's `real_balance` with any value.

      Use cases:
      - **Top-up** before a wager test so the player has sufficient funds.
      - **Drain to zero** (`real_balance=0`) to trigger error `1006 (Out of Money)`
        on the next wager — useful when the player also has no bonus balance.
      - **Set an exact amount** to verify split-wallet deduction logic.

      Does not affect `bonus_balance` or any other account field.

  - name: Set Bonus Balance
    description: |
      Overwrite a player's `bonus_balance` with any value.

      Use cases:
      - **Add bonus funds** to test bonus-wallet draw-order scenarios with
        `wallet_order=bonus_money,cash_money`.
      - **Set to zero** while `real_balance` is also zero to confirm `1006
        (Out of Money)` fires when there are no funds in either wallet.
      - **Test bonus-only account** (`real_balance=0`, `bonus_balance>0`) to
        verify the server draws exclusively from bonus.

      Does not affect `real_balance` or any other account field.

  - name: Block Account
    description: |
      Toggle the `blocked` flag on a player account.

      - `blocked=true` — the next `wager`, `wagerAndResult`, or `purchase` call
        for this account returns error `1035 (Account Blocked)`. `getaccount`,
        `getbalance`, `result`, `refund`, and `jackpot` are unaffected.
      - `blocked=false` — re-enables normal processing for the account.

      The flag can be toggled at any time, including mid-test. Combine with
      `/create-data?request=create_account&blocked=true` to create an account
      that is blocked from the start.

  - name: Set Wallet Order
    description: |
      Update the `wallet_order` field that controls which balance pot is drawn
      from first when the player places a wager or purchase.

      | Value | Behaviour |
      |---|---|
      | `cash_money,bonus_money` | Real money is deducted first; bonus used only if real is insufficient |
      | `bonus_money,cash_money` | Bonus money is deducted first; real used only if bonus is insufficient |

      The updated order takes effect on the very next wallet callback — no
      session refresh is required. Use this to test CMA-compliant game flows
      where the game reads `wallet_order` from `getaccount` and enforces it
      throughout the session.

  - name: Reset Store
    description: |
      Wipe the entire in-memory store in a single call — all accounts, sessions,
      transactions, and queued simulations are deleted atomically.

      Use this as the first step in any test scenario that needs a guaranteed
      clean state, or as the last step to clean up after a test run.

      After a reset the store is identical to a fresh server start:
      `accounts: {}`, `sessions: {}`, `transactions: []`.

  - name: Simulation
    description: |
      **Simulation queue** — pre-program the exact response the mock wallet will
      return for a specific `account_id` + operation, overriding all real
      in-memory processing for that one call.

      ## How it works

      The simulation layer sits in front of the live wallet logic. When
      `SIMULATION_MODE` is enabled (the default), every `/cloudagg` request first
      checks whether a matching entry exists in the queue by `account_id` **and**
      `request` type. If one is found it is consumed (removed) and its payload is
      returned verbatim — the real account balance and transaction log are never
      touched.

      ## Workflow

      ```
      1. Open the simulation path for the operation you want to intercept.
      2. Select a scenario example — success or a specific error code.
      3. Click Execute to enqueue the simulation.
      4. Fire the matching /cloudagg callback.
         → The queued response is returned and the entry is removed.
      5. The next identical /cloudagg call falls through to the real wallet.
      6. Use /clear-simulations to flush the entire queue at any time.
      ```

      ## Key rules

      - **One-shot**: each queued entry is consumed by exactly one matching request.
      - **Scoped by account + operation**: a `getbalance` queue entry will not
        interfere with a `wager` call, even for the same `account_id`.
      - **Error simulation**: include `error_code` (and optionally `error_message`)
        to force any supported error response regardless of account state.
      - **Balance fields**: for success simulations, set `real_balance` and
        `bonus_balance` to control what the mocked response reports — the actual
        stored balance is unaffected.
      - **No side-effects**: simulated wagers do not deduct balances; simulated
        results do not credit them. Simulations are purely response stubs.

  - name: "Sim: GetAccount"
    description: |
      Queue a simulated response for the next **GetAccount** (5.3) call for a given `account_id`.

      **Success scenarios** — control what `account_id`, `currency`, `language`,
      `real_balance`, `bonus_balance`, `game_mode`, and `wallet_order` are echoed
      back, independent of the real in-memory account state.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `1003` | Authentication Failed | Session / account mismatch |
      | `1008` | Parameter Required | A required query parameter is missing |

  - name: "Sim: GetBalance"
    description: |
      Queue a simulated response for the next **GetBalance** (5.4) call for a given `account_id`.

      **Success scenarios** — control `real_balance`, `bonus_balance`,
      `game_mode`, and `wallet_order` returned, independent of the real stored balance.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `1000` | Not Logged On | Session has expired or was never created |
      | `1003` | Authentication Failed | Operator-side auth rejection |
      | `1008` | Parameter Required | A required query parameter is missing |

  - name: "Sim: Wager"
    description: |
      Queue a simulated response for the next **Wager** (5.5) call for a given `account_id`.

      **Success scenarios** — set `real_balance`/`bonus_balance` to control the
      balance fields returned in the response. Optionally pass `transaction_id` to
      control the `wager_tx_id` echoed back. The real balance is **not** deducted.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `110` | Operation Not Allowed | Round is closed or session mismatch |
      | `400` | Transaction Parameter Mismatch | Duplicate `transaction_id` with conflicting fields |
      | `409` | Round Already Closed / Transaction ID In Use | Idempotency conflict |
      | `1000` | Not Logged On | Session has expired or was never created |
      | `1006` | Out of Money | Insufficient funds |
      | `1019` | Gaming Limit | Responsible gaming limit exceeded |
      | `1035` | Account Blocked | Player is self-excluded or blocked |

  - name: "Sim: Result"
    description: |
      Queue a simulated response for the next **Result** (5.6) call for a given `account_id`.

      **Success scenarios** — set `real_balance`/`bonus_balance` to control the
      balance fields returned. Optionally pass `transaction_id` to control the
      `result_tx_id` echoed back. The real balance is **not** credited.

      > **Critical rule:** Result must never return `1000`. A simulation that
      > returns `1000` for a Result would be a protocol violation — use error `1`
      > instead to test general failure paths.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `102` | Wager Not Found | No matching wager was found for this round |
      | `110` | Operation Not Allowed | Round is already closed |
      | `400` | Transaction Parameter Mismatch | Duplicate `transaction_id` with conflicting fields |
      | `409` | Round Already Closed | Round was previously finalised |

  - name: "Sim: WagerAndResult"
    description: |
      Queue a simulated response for the next **WagerAndResult** (5.7) call for a given `account_id`.

      **Success scenarios** — set `real_balance`/`bonus_balance` to control the
      balance fields returned. Optionally pass `transaction_id` to control both
      `wager_tx_id` and `result_tx_id` echoed back (suffixed `_wager` / `_result`).
      Neither balance is modified by a simulated call.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `110` | Operation Not Allowed | Round is closed or session mismatch |
      | `400` | Transaction Parameter Mismatch | Duplicate `transaction_id` with conflicting fields |
      | `1000` | Not Logged On | Session has expired or was never created |
      | `1006` | Out of Money | Insufficient funds |
      | `1019` | Gaming Limit | Responsible gaming limit exceeded |
      | `1035` | Account Blocked | Player is self-excluded or blocked |

  - name: "Sim: Refund"
    description: |
      Queue a simulated response for the next **Refund** (5.8) call for a given `account_id`.

      **Success scenarios** — set `real_balance`/`bonus_balance` to control the
      balance fields returned. Optionally provide `transaction_id` to set the
      `refund_tx_id` echoed back. The real balance is **not** credited.

      > **Critical rule:** Refund must never return `1000`. A simulated refund
      > that returns `1000` would be a protocol violation — use error `1` instead
      > to test general failure paths.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `102` | Wager Not Found | No matching wager found for the given `transaction_id` |
      | `110` | Operation Not Allowed (result already delivered) | A Result was already accepted for this round |
      | `400` | Transaction Parameter Mismatch | Duplicate `transaction_id` with conflicting fields |
      | `409` | Already Refunded | This wager has already been reversed |

  - name: "Sim: Jackpot"
    description: |
      Queue a simulated response for the next **Jackpot** (5.9) call for a given `account_id`.

      **Success scenarios** — set `real_balance`/`bonus_balance` to control the
      balance fields returned. Optionally pass `transaction_id` to control the
      `jackpot_tx_id` echoed back. The real balance is **not** credited.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `110` | Operation Not Allowed | Round scope or idempotency violation |
      | `400` | Transaction Parameter Mismatch | Duplicate `transaction_id` with conflicting fields |
      | `409` | Transaction ID In Use | Jackpot already processed for this `transaction_id` |
      | `1000` | Not Logged On | Session lookup returned no match |
      | `1008` | Parameter Required | A required query parameter is missing |
      | `1035` | Account Blocked | Player is self-excluded or blocked |

  - name: "Sim: Purchase"
    description: |
      Queue a simulated response for the next **Purchase** (5.10) call for a given `account_id`.

      **Success scenarios** — set `real_balance`/`bonus_balance` to control the
      balance fields returned. Optionally pass `transaction_id` to control the
      `purchase_tx_id` echoed back. The real balance is **not** deducted.

      **Supported error codes:**

      | Code | Status | Meaning |
      |---|---|---|
      | `1` | Technical Error | General internal failure |
      | `110` | Operation Not Allowed | Purchase is not permitted for this account or product |
      | `1000` | Not Logged On | Session has expired or was never created |
      | `1006` | Out of Money | Insufficient funds for the purchase amount |
      | `1008` | Parameter Required | A required query parameter is missing |
      | `1019` | Gaming Limit | Responsible gaming limit would be exceeded |
      | `1035` | Account Blocked | Player is self-excluded or blocked |

# ══════════════════════════════════════════════════════════════════════════════
#  APPENDIX A — Response Status Codes (Section 7)
#
#  All codes are returned inside the JSON body at HTTP 200.
#
#  Code | Status                         | Used in
#  -----+--------------------------------+--------------------------------------------
#   200 | Success                        | All endpoints
#   200 | Success - duplicate request    | All transaction endpoints (idempotency)
#     1 | Technical Error                | All endpoints
#   102 | Wager Not Found                | Refund
#   110 | Operation Not Allowed          | Wager, Result, WagerAndResult, Refund, Jackpot, Purchase
#   400 | Transaction Parameter Mismatch | Wager, Result, WagerAndResult, Refund, Jackpot, Purchase
#   409 | Round Already Closed           | Wager, Result
#   409 | Transaction ID In Use          | Wager, Result
#  1000 | Not Logged On                  | GetBalance, Wager (NEVER for Result or Refund)
#  1003 | Authentication Failed          | GetAccount
#  1006 | Out of Money                   | Wager, WagerAndResult, Purchase
#  1007 | Unknown Currency               | GetAccount, GetBalance
#  1008 | Parameter Required             | All endpoints
#  1019 | Gaming Limit                   | Wager, WagerAndResult, Purchase
#  1035 | Account Blocked                | Wager, WagerAndResult, Purchase
# ══════════════════════════════════════════════════════════════════════════════
