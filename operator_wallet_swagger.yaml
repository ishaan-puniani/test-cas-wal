# ══════════════════════════════════════════════════════════════════════════════
#  TEST UTILITY PATHS
# ══════════════════════════════════════════════════════════════════════════════

  /whats-in-data:
    get:
      operationId: whatsInData
      summary: "Inspect full in-memory store"
      description: |
        Returns a complete JSON snapshot of the in-memory store across three keys:

        | Key | Contents |
        |---|---|
        | `accounts` | Every account keyed by `account_id`. Each entry shows `real_balance`, `bonus_balance`, `currency`, `language`, `country`, `city`, `game_mode`, `wallet_order`, and `blocked` flag. |
        | `sessions` | A flat map of `session_id → account_id`. Shows every active session mapping. |
        | `transactions` | Ordered array of every transaction recorded (wager, result, wagerAndResult, refund, jackpot, purchase) in the sequence they arrived. |

        **Typical use patterns:**
        - Call before and after a wallet callback to diff the state change.
        - Confirm a session was registered with `/create-data?request=create_session`.
        - Verify a wager was deducted and a result was credited.
        - Troubleshoot a failing simulation by confirming the queue entry was consumed.

        The response always returns HTTP `200` regardless of store contents.
        An empty store returns `accounts: {}`, `sessions: {}`, `transactions: []`.
      tags:
        - Test Utilities
      security: []
      responses:
        '200':
          description: Current in-memory store snapshot.
          content:
            application/json:
              schema:
                type: object
              examples:
                snapshot:
                  summary: Example snapshot
                  value:
                    code: 200
                    status: "Success"
                    api_version: "2.0"
                    data:
                      accounts:
                        PLR_78345:
                          real_balance: 250.00
                          bonus_balance: 50.00
                          currency: "EUR"
                          language: "en_GB"
                          country: "SE"
                          city: "Stockholm"
                          game_mode: 1
                          wallet_order: "cash_money,bonus_money"
                          blocked: false
                      sessions:
                        demo-session: "PLR_78345"
                      transactions: []

  /reset-store:
    get:
      operationId: resetStore
      summary: "Reset Store — Wipe all accounts, sessions, and transactions"
      description: |
        Deletes **all** data from the in-memory store in a single call:
        - All player accounts
        - All session mappings
        - The full transaction log
        - All queued simulations

        Use this at the start of a new test scenario to guarantee a clean slate.
        The response echoes back the store state after the reset, which will
        always be `accounts: {}`, `sessions: {}`, `transactions: []`.

        > **Note:** This is equivalent to restarting the server. Prefer calling
        > this over restarting so that the Swagger UI session stays alive.
      tags:
        - Test Utilities
      security: []
      responses:
        '200':
          description: Store wiped. Returns the empty store snapshot.
          content:
            application/json:
              schema:
                type: object
              examples:
                reset:
                  summary: Store reset successfully
                  value:
                    code: 200
                    status: "Success"
                    api_version: "2.0"
                    message: "Store reset"
                    data:
                      accounts: {}
                      sessions: {}
                      transactions: []

