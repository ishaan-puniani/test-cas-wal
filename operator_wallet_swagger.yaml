                  value: { request: create_account, account_id: "PLR_78345", real_balance: 1000.00, bonus_balance: 50.00, currency: "EUR", language: "en_GB", country: "SE", city: "Stockholm", game_mode: 1, wallet_order: "cash_money,bonus_money", blocked: "false" }
                bonusFirst:
