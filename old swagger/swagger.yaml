openapi: 3.0.0
info:
  title: CloudAggregator Mock Operator Wallet
  description: |
    Mock Operator Wallet API for CloudAggregator integration testing.
    Implements the CloudAggregator Platform Integration Guide with full error code coverage.
  version: 1.0.0
  contact:
    name: CloudAggregator
    url: https://cloudaggregator.com

servers:
  - url: http://localhost:3000
    description: Local mock wallet server
  - url: https://operator-wallet.example.com
    description: Production operator wallet

paths:
  /cloudagg:
    get:
      summary: GetAccount - Retrieve Player Profile
      description: Retrieve player account details at the start of a game session.
      operationId: getAccount
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: getaccount
          example: getaccount
        - name: session_id
          in: query
          required: true
          schema:
            type: string
            maxLength: 36
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
            maxLength: 32
          example: PLR_78345
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [desktop, mobile, tablet]
          example: desktop
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
        - name: game_id
          in: query
          required: false
          schema:
            type: string
          example: "50301"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
          example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
      responses:
        "200":
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountResponse"

  /cloudagg/getbalance:
    get:
      summary: GetBalance - Retrieve Player Balance
      description: Get current player wallet balance before game round begins.
      operationId: getBalance
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: getbalance
          example: getbalance
        - name: session_id
          in: query
          required: true
          schema:
            type: string
            maxLength: 36
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [desktop, mobile, tablet]
          example: desktop
        - name: game_id
          in: query
          required: true
          schema:
            type: string
          example: "50301"
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Balance retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBalanceResponse"

  /cloudagg/wager:
    get:
      summary: Wager - Place Bet
      description: Player places a bet. Operator deducts wager from wallet.
      operationId: wager
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: wager
          example: wager
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: transaction_id
          in: query
          required: true
          schema:
            type: string
          example: TXN_WAGER_001
        - name: round_id
          in: query
          required: true
          schema:
            type: string
          example: RND_001
        - name: game_id
          in: query
          required: true
          schema:
            type: string
          example: "50301"
        - name: bet_amount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          example: 5.00
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [desktop, mobile, tablet]
          example: desktop
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Wager accepted and balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WagerResponse"

  /cloudagg/result:
    get:
      summary: Result - Process Game Outcome
      description: Game result notification. Operator credits winnings to player wallet.
      operationId: result
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: result
          example: result
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: transaction_id
          in: query
          required: true
          schema:
            type: string
          example: TXN_RESULT_001
        - name: round_id
          in: query
          required: true
          schema:
            type: string
          example: RND_001
        - name: game_id
          in: query
          required: true
          schema:
            type: string
          example: "50301"
        - name: win_amount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          example: 12.50
        - name: game_status
          in: query
          required: true
          schema:
            type: string
            enum: [pending, completed]
          example: completed
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Result processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultResponse"

  /cloudagg/wagerAndResult:
    get:
      summary: WagerAndResult - Atomic Bet & Outcome
      description: Atomic wager and result in single request (for Rummy, Bingo, Lottery).
      operationId: wagerAndResult
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: wagerAndResult
          example: wagerAndResult
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: transaction_id
          in: query
          required: true
          schema:
            type: string
          example: TXN_WR_001
        - name: round_id
          in: query
          required: true
          schema:
            type: string
          example: RND_WR_001
        - name: game_id
          in: query
          required: true
          schema:
            type: string
          example: "50301"
        - name: bet_amount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          example: 2.00
        - name: win_amount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          example: 6.00
        - name: game_status
          in: query
          required: true
          schema:
            type: string
            enum: [pending, completed]
          example: completed
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [desktop, mobile, tablet]
          example: desktop
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Atomic wager and result processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WagerAndResultResponse"

  /cloudagg/refund:
    get:
      summary: Refund - Reverse Wager
      description: Reverse a wager when result cannot be delivered due to technical failure.
      operationId: refund
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: refund
          example: refund
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: transaction_id
          in: query
          required: true
          schema:
            type: string
          description: Original wager transaction_id to refund
          example: TXN_WAGER_001
        - name: game_id
          in: query
          required: true
          schema:
            type: string
          example: "50301"
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [desktop, mobile, tablet]
          example: desktop
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Refund processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundResponse"

  /cloudagg/jackpot:
    get:
      summary: Jackpot - Progressive Prize
      description: Player wins a progressive or fixed jackpot prize.
      operationId: jackpot
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: jackpot
          example: jackpot
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: transaction_id
          in: query
          required: true
          schema:
            type: string
          example: TXN_JP_001
        - name: round_id
          in: query
          required: true
          schema:
            type: string
          example: RND_JP_001
        - name: game_id
          in: query
          required: true
          schema:
            type: string
          example: "50301"
        - name: jackpot_amount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          example: 10000.00
        - name: game_status
          in: query
          required: true
          schema:
            type: string
            enum: [pending, completed]
          example: completed
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Jackpot credited successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JackpotResponse"

  /cloudagg/purchase:
    get:
      summary: Purchase - Feature Buy
      description: Player purchases an in-game feature (free spins, bonus, tournament entry).
      operationId: purchase
      tags:
        - Transactions
      parameters:
        - name: request
          in: query
          required: true
          schema:
            type: string
            const: purchase
          example: purchase
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          example: CA_OP_42_demo-session-001
        - name: account_id
          in: query
          required: true
          schema:
            type: string
          example: PLR_78345
        - name: transaction_id
          in: query
          required: true
          schema:
            type: string
          example: TXN_PURCHASE_001
        - name: purchase_amount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          example: 1.50
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [desktop, mobile, tablet]
          example: desktop
        - name: api_version
          in: query
          required: true
          schema:
            type: string
          example: "2.0"
      headers:
        X-CA-Signature:
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Purchase processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResponse"

  /health:
    get:
      summary: Health Check
      description: Simple health check endpoint
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

components:
  schemas:
    GetAccountResponse:
      type: object
      required:
        - code
        - status
        - account_id
        - currency
        - language
        - country
        - city
        - session_id
        - real_balance
        - bonus_balance
        - api_version
      properties:
        code:
          type: integer
          example: 200
          description: Response status code
        status:
          type: string
          example: Success
          description: Human-readable status
        account_id:
          type: string
          example: PLR_78345
        currency:
          type: string
          example: EUR
          description: ISO 4217 currency code
        language:
          type: string
          example: en_GB
          description: ISO 639-1 + ISO 3166-1 format
        country:
          type: string
          example: SE
          description: ISO 3166-1 alpha-2
        city:
          type: string
          example: Stockholm
        session_id:
          type: string
          example: CA_OP_42_demo-session-001
        real_balance:
          type: number
          format: decimal
          example: 250.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        game_mode:
          type: integer
          example: 1
          description: "0=combined, 1=real, 2=bonus"
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    GetBalanceResponse:
      type: object
      required:
        - code
        - status
        - balance
        - real_balance
        - bonus_balance
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        balance:
          type: number
          format: decimal
          example: 300.00
          description: Total balance (real + bonus)
        real_balance:
          type: number
          format: decimal
          example: 250.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        game_mode:
          type: integer
          example: 1
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    WagerResponse:
      type: object
      required:
        - code
        - status
        - wager_tx_id
        - balance
        - real_balance
        - bonus_balance
        - real_money_bet
        - bonus_money_bet
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        wager_tx_id:
          type: string
          example: WALL_TXN_8823AABB
          description: Operator's internal transaction reference
        balance:
          type: number
          format: decimal
          example: 295.00
        real_balance:
          type: number
          format: decimal
          example: 245.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        real_money_bet:
          type: number
          format: decimal
          example: 5.00
        bonus_money_bet:
          type: number
          format: decimal
          example: 0.00
        game_mode:
          type: integer
          example: 1
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    ResultResponse:
      type: object
      required:
        - code
        - status
        - result_tx_id
        - balance
        - real_balance
        - bonus_balance
        - real_money_win
        - bonus_win
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        result_tx_id:
          type: string
          example: WALL_TXN_CC99AA
        balance:
          type: number
          format: decimal
          example: 307.50
        real_balance:
          type: number
          format: decimal
          example: 257.50
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        real_money_win:
          type: number
          format: decimal
          example: 12.50
        bonus_win:
          type: number
          format: decimal
          example: 0.00
        game_mode:
          type: integer
          example: 1
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    WagerAndResultResponse:
      type: object
      required:
        - code
        - status
        - wager_tx_id
        - result_tx_id
        - balance
        - real_balance
        - bonus_balance
        - real_money_bet
        - bonus_money_bet
        - real_money_win
        - bonus_win
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        wager_tx_id:
          type: string
          example: WALL_TXN_WR_991A
        result_tx_id:
          type: string
          example: WALL_TXN_WR_991A
        balance:
          type: number
          format: decimal
          example: 304.00
        real_balance:
          type: number
          format: decimal
          example: 254.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        real_money_bet:
          type: number
          format: decimal
          example: 2.00
        bonus_money_bet:
          type: number
          format: decimal
          example: 0.00
        real_money_win:
          type: number
          format: decimal
          example: 6.00
        bonus_win:
          type: number
          format: decimal
          example: 0.00
        game_mode:
          type: integer
          example: 1
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    RefundResponse:
      type: object
      required:
        - code
        - status
        - refund_tx_id
        - balance
        - real_balance
        - bonus_balance
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        refund_tx_id:
          type: string
          example: OP_RB_TXN_8823BB
        balance:
          type: number
          format: decimal
          example: 300.00
        real_balance:
          type: number
          format: decimal
          example: 250.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        game_mode:
          type: integer
          example: 1
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    JackpotResponse:
      type: object
      required:
        - code
        - status
        - wallet_tx_id
        - balance
        - real_balance
        - bonus_balance
        - real_money_win
        - bonus_win
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        wallet_tx_id:
          type: string
          example: WALL_JP_TXN_8811
        balance:
          type: number
          format: decimal
          example: 10300.00
        real_balance:
          type: number
          format: decimal
          example: 10250.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        real_money_win:
          type: number
          format: decimal
          example: 10000.00
        bonus_win:
          type: number
          format: decimal
          example: 0.00
        api_version:
          type: string
          example: "2.0"

    PurchaseResponse:
      type: object
      required:
        - code
        - status
        - purchase_tx_id
        - balance
        - real_balance
        - bonus_balance
        - real_money_bet
        - bonus_money_bet
        - api_version
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        purchase_tx_id:
          type: string
          example: OP_TXN_8823AABB
        balance:
          type: number
          format: decimal
          example: 295.00
        real_balance:
          type: number
          format: decimal
          example: 245.00
        bonus_balance:
          type: number
          format: decimal
          example: 50.00
        real_money_bet:
          type: number
          format: decimal
          example: 1.50
        bonus_money_bet:
          type: number
          format: decimal
          example: 0.00
        game_mode:
          type: integer
          example: 1
        wallet_order:
          type: string
          example: cash_money,bonus_money
        api_version:
          type: string
          example: "2.0"

    ErrorResponse:
      type: object
      required:
        - code
        - status
      properties:
        code:
          type: integer
          description: Error code from Appendix A
          example: 1006
          enum:
            - 1
            - 102
            - 110
            - 400
            - 401
            - 409
            - 1000
            - 1003
            - 1006
            - 1007
            - 1008
            - 1019
            - 1035
        status:
          type: string
          description: Human-readable error status
          example: Out of Money
          enum:
            - Technical Error
            - Wager Not Found
            - Operation Not Allowed
            - Transaction Parameter Mismatch
            - Unauthorized
            - Round Closed
            - Not Logged On
            - Authentication Failed
            - Out of Money
            - Unknown Currency
            - Parameter Required
            - Gaming Limit
            - Account Blocked
        message:
          type: string
          description: Detailed error message
          example: Insufficient funds for wager
        api_version:
          type: string
          example: "2.0"

  securitySchemes:
    HMACSignature:
      type: apiKey
      in: header
      name: X-CA-Signature
      description: |
        HMAC-SHA256 signature of the request body.
        For GET requests, sign empty string.
        Format: hex(HMAC_SHA256("", shared_secret))

security:
  - HMACSignature: []

tags:
  - name: Transactions
    description: Transaction callback endpoints
  - name: Health
    description: Service health check

x-cloudaggregator:
  error-codes:
    "200":
      description: Success
    "1":
      description: Technical Error - Internal server error
    "102":
      description: Wager Not Found - Used in refund if no matching wager exists
    "110":
      description: Operation Not Allowed - Business rule violation
    "400":
      description: Transaction Parameter Mismatch - Duplicate transaction with different fields
    "401":
      description: Unauthorized - Invalid or missing signature
    "409":
      description: Round Closed - Round already completed
    "1000":
      description: Not Logged On - Session invalid (NOT used for result/refund)
    "1003":
      description: Authentication Failed - Session/account mismatch
    "1006":
      description: Out of Money - Insufficient funds
    "1007":
      description: Unknown Currency - Currency not registered
    "1008":
      description: Parameter Required - Missing mandatory parameter
    "1019":
      description: Gaming Limit - Responsible gaming limit exceeded
    "1035":
      description: Account Blocked - Account suspended, self-excluded, or blocked

  supported-currencies:
    - EUR
    - USD
    - GBP
    - SEK
    - INR
    - COINS
    - CHIPS

  example-flow:
    - step: 1
      operation: getaccount
      description: Retrieve player account details
    - step: 2
      operation: getbalance
      description: Get current player balance
    - step: 3
      operation: wager
      description: Place bet
    - step: 4
      operation: result
      description: Credit/process game result
    - step: 5
      operation: refund
      description: (Optional) Reverse wager on failure
